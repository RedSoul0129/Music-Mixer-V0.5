<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Mixer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content">
        <h1>Studio de Mixage</h1>
        
        <div class="tracks-wrapper">
            <div class="track-panel">
                <div class="vinyl-container">
                    <div class="vinyl" id="vinyl-main">
                        <div class="vinyl-center"></div>
                    </div>
                </div>
                <h2>Piste Principale</h2>
                <input type="file" id="main-audio" accept="audio/*">
            </div>

            <div class="track-panel">
                <div class="vinyl-container">
                    <div class="vinyl" id="vinyl-sec">
                        <div class="vinyl-center"></div>
                    </div>
                </div>
                <h2>Piste Secondaire</h2>
                <input type="file" id="sec-audio" accept="audio/*">
                <div class="input-group">
                    <label>Zone à couper (en secondes) :</label>
                    <input type="number" id="mute-start" placeholder="Début (ex: 10)">
                    <input type="number" id="mute-end" placeholder="Fin (ex: 25)">
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="mix-btn">Générer le Smart Mix (Auto BPM)</button>
        </div>

        <div class="library">
            <h2>Mixes Récents</h2>
            <ul id="mix-list">
                <li class="empty-msg">Aucun mix pour le moment...</li>
            </ul>
        </div>
    </div>

    <div class="bottom-player">
        <div class="player-info">
            <span id="current-mix-name">Aucun mix chargé</span>
        </div>
        <div class="player-controls">
            <button id="play-pause-btn" disabled>▶️</button>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100" disabled>
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div class="player-volume">
            <label>Vol. Principal:</label>
            <input type="range" id="main-volume" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
